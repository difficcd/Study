 
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lecture 07</title>
    </head>


    <body>
        <h4> Lecture 07 </h4>


        <p class="intro"> INFORMATION 01  </p>
        <p class="intro"> INFORMATION 02 </p>


        <p id="id1"></p>
        <p id="id2"></p>
        <p id="id3"></p>
        <p id="id4"></p>
        <p id="id5"></p>
        Name: <input type="text" id="id6">
              <button onclick="Try()">TRY it</button>
        <p id="id7"> GRAY! </p>
        <p id="id8"></p>
        <p id="id9"></p>


        <img src="cuty.png"  style="height:200px;" id="image">

        
        <span> span 1 </span>
        <span> span 2 </span>

        <br><br>
        <button type="button" onclick="SHOW()"> CLICK </button> <!--LOOP-->
        <button onclick="CREATE()"> ORIGINAL </button>  <!-- createElement -->
        <div id="newbutton"></div>
 

        <br><br>
        <script>

            document.getElementById("id1").innerHTML = "(1) ALTERNATE ID1 <br>"

            // getElements : 복수의 요소, innerHTML 필요
            const element = document.getElementsByTagName("span")
            document.getElementById("id2").innerHTML 
              = "(2) ByTagName: (" + element[0].innerHTML + " is SPAN)" +
                "  &&  (" + element[0].tagName + " is SPAN)" ;

            // getClassName
            const x = document.getElementsByClassName("intro")
            document.getElementById("id3").innerHTML
              = "(3) ByCLass: " + x[0].innerHTML + " : class=intro";


            // querySelectorALL 의 결과는 NodeList
            const o = document.querySelectorAll("p.intro");
            document.getElementById("id4").innerHTML 
                = "(4) QuerySelector: " + o[1].innerHTML;


            // document.body 
            document.getElementById("id5").innerHTML
                = "(5) document.body: <br><br> =========== " 
                + document.body.innerHTML + " =========== <br>";


            // GetByID - Attribute
            document.getElementById("image").src = "cute.png"  

            // GetByID - value : 값이 넣어짐 !!!!
            function Try(){
                document.getElementById("id6").value = "JANE DOE";
            }


            document.getElementById("id7").style.background = "gray";
            // CSS a-b 가 속성명인 경우, -빼고 b대문자 해서 aB가 됨!
            // 특히 중요: background == background-color
            // 중요!! 실시간으로 style 변경하는 경우 매우 용이!! onclick & GetById.style.[]=..


            //createElement
            function CREATE(){
                var btn = document.createElement("BUTTON")
                    // BUTTON, p ...
                btn.innerHTML = "BUTTON!!";
                document.getElementById("newbutton").appendChild(btn);
            }


           // 반복문 : document.write로 호출될때 스스로를 만들기!
            function SHOW(){
                var output = document.getElementsByClassName("CLASS")[2].innerHTML;
                alert(output);
            }
            for(var i=1; i<6; i++){
                document.write('<li class="CLASS"> List item ' + i +'</li>');
            }

        </script>

        <br><br>
        <input type="text" id="task" placeholder="Task!">
        <button onclick="ADDTASK()">ADD!</button>
        <ol id="LIST"></ol>
        
        <script>
            function ADDTASK(){
                var input = document.getElementById("task").value;
                var newTask = document.createElement("li");
                newTask.innerHTML = input;

                document.getElementById("LIST").appendChild(newTask);
            }
        </script>


        <textarea id="TEXT" rows="5" cols="40"> </textarea>
        <p id="COUNT">text: 0</p>

        <script>
            var input = document.getElementById("TEXT");
            var count = document.getElementById("COUNT");

            input.addEventListener("input", function() {
                count.innerText = "text: " + input.value.length;
            });
        </script>

    </body>
</html>
