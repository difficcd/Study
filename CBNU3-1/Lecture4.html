
<!DOCTYPE html>

<html>
    <head>
        <title> Lecture 04 </title>

        <style>
            :root{
                --blue: rgb(42, 75, 207);  
                --gray:  rgb(167, 167, 167);
            }

            * { text-align: center; }
            body { margin: 20px; }
            video{ border: 20px solid black;
                   border-radius: 20px; }
                   
            h2, p {
                display: inline;
            }
            
            .inblock { display: block; }
            li { border: 4px solid var(--blue);
                 display: inline; 
                 padding:5px; margin:5px;
                 border-radius: 20px;  }

            span.a{
                display: inline-block;
                /* inline 방식인데, 크기 여백 조절가능  */
                width: 100px; 
                border-radius: 20px;
                padding: 10px; margin: 10px;
                background-color: black;
                color: white; font-weight: bold;
            }



            #static1, #static2{
                position: static;
                width: 50px; padding:20px;
                border-radius: 20px;
                background-color: rgb(200, 200, 203);
                margin: auto;
                margin-bottom: 10px;
            }

            #relative1, #relative2 {
                position: relative;
                width: 50px; padding:20px;
                border-radius: 20px;
                background-color: rgb(149, 166, 216);
                margin: auto;
                margin-bottom: 10px;
            }   
            #relative1 { top: 0px; left: -100px; }
            #relative2 { top: 0px; left:  100px; }
            

            #absolute1 {
                position: absolute;
                width: 50px; padding:20px;
                border-radius: 20px;
                background-color: rgb(155, 162, 183);
                margin: auto;
                margin-bottom: 10px;
                top: 600px; left: 400px;
            }


            
            #fixed1, #fixed2{
                position: fixed;
                width: 50px; padding:20px;
                border-radius: 20px;
                background-color: var(--blue);
                margin: auto;
                margin-bottom: 10px;
                top: 20px; left: 500px;
            }

            #fixed2 { z-index: 999; }



            #left, #right {
                width: 50px; padding:20px;
                border-radius: 20px;
                border: 4px solid var(--gray);
            }
            #left { float: left; }
            #right { float: right;}

            .clear {
                clear: both; margin: auto;
                width: 300px; padding:20px;
                border-radius: 20px;
                border: 4px solid var(--gray);
                
            }

            .clear:hover {
                background-color: rgb(249, 249, 249);
            }

        </style>
    </head>


    <body>
        <span class="inblock">
            <h2> Lecture 04 </h2>
            <p> : Advanced CSS</p>
        </span><br>

        <span class="a"> HEY </span>
        <span class="a"> HEY </span><br>

        <video src="anta.mp4" controls autoplay muted loop
               height="300px"></video> <br>

        <ul>
            <li> MILK </li>
            <li> MOKE </li>
            <li> MASK </li>
        </ul><br>

        <div id="static1"> Static 1 </div>
        <div id="static2"> Static 2 </div>

        <div id="relative1"> Relative 1 </div>
        <div id="relative2"> Relative 2 </div>

        <div id="absolute1"> Absolute 1 </div>
        <div id="fixed1"> <b>PLAY?</b> </div>

        <div id="left"> LEFT </div>
        <div id="right"> RIGHT </div> 
        <div class="clear"> CLEAR </div> <!--유무 차이 확인!!-->
        <br><br> <br><br>

        <div id="fixed2"> <b>PLAY!</b> </div>
        

    </body>
</html>
